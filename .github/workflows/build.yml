name: Evolution X Build Cloud

on:
  workflow_dispatch: # Tạo nút bấm chạy thủ công trên Web GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: 🧹 Dọn rác thủ công (Ép nới rộng ổ đĩa không sợ lỗi)
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        docker image prune --all --force
        sudo apt-get clean
        df -h

    - name: Cài đặt các công cụ build Android
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzma pathspec python3-pathspec pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libwxgtk3.2-dev libncurses5

    - name: Thiết lập Repo Tool của Google
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Tải Source Code Evolution X (Ăn Kiêng Cực Hạn)
      run: |
        mkdir -p /home/runner/android/evox
        cd /home/runner/android/evox
        git config --global user.name "Mtva8686"
        git config --global user.email "clongic84@gmail.com"
        repo init -u https://github.com/Evolution-X/manifest -b bq2 --git-lfs --depth=1 --groups=all,-notdefault,-device,-infrastructure,-tests
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

    - name: Ráp các mảnh ghép của ông vào hệ thống (Full Driver Phần Cứng)
      run: |
        cd /home/runner/android/evox
        
        # 1. Cây cấu hình cốt lõi từ kho cá nhân của ông
        git clone --depth=1 https://github.com/Mtva8686/android_device_samsung_m21 -b 16.0 device/samsung/m21
        git clone --depth=1 https://github.com/Mtva8686/android_device_samsung_universal9611-common -b 16.0 device/samsung/universal9611-common
        git clone --depth=1 https://github.com/Mtva8686/kernel_samsung_universal9611 -b Grass-Unified kernel/samsung/universal9611
        
        # 2. Driver độc quyền Vendor độc quyền từ crDroid để nhận sóng, vân tay, camera
        git clone --depth=1 https://github.com/crdroidandroid/proprietary_vendor_samsung_m21 -b 16.0 vendor/samsung/m21
        git clone --depth=1 https://github.com/crdroidandroid/proprietary_vendor_samsung_universal9611-common -b 16.0 vendor/samsung/universal9611-common

        # 3. Đống mảnh ghép HALs phần cứng Exynos 9611 bắt buộc phải có
        git clone --depth=1 https://github.com/crdroidandroid/android_device_samsung_slsi_sepolicy -b 16.0 device/samsung_slsi/sepolicy
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung -b 16.0 hardware/samsung
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi_libbt -b 16.0 hardware/samsung_slsi/libbt
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi-linaro_config -b 16.0 hardware/samsung_slsi-linaro/config
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi-linaro_exynos -b 16.0 hardware/samsung_slsi-linaro/exynos
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi-linaro_exynos5 -b 16.0 hardware/samsung_slsi-linaro/exynos5
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi-linaro_graphics -b 16.0 hardware/samsung_slsi-linaro/graphics
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi-linaro_interfaces -b 16.0 hardware/samsung_slsi-linaro/interfaces
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi-linaro_openmax -b 16.0 hardware/samsung_slsi-linaro/openmax
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi_scsc_wifibt_wifi_hal -b 16.0 hardware/samsung_slsi/scsc_wifibt/wifi_hal
        git clone --depth=1 https://github.com/crdroidandroid/android_hardware_samsung_slsi_scsc_wifibt_wpa_supplicant_lib -b 16.0 hardware/samsung_slsi/scsc_wifibt/wpa_supplicant_lib

    - name: 🛠️ Phẫu thuật độ Tree (Ép cây crDroid chạy trên Evolution X)
      run: |
        cd /home/runner/android/evox/device/samsung/m21
        mv crdroid_m21.mk evox_m21.mk
        sed -i 's/crdroid/evox/g' evox_m21.mk
        sed -i 's/lineage/evox/g' evox_m21.mk
        sed -i 's/crdroid/evox/g' AndroidProducts.mk
        sed -i 's/lineage_m21/evox_m21/g' AndroidProducts.mk

    - name: Bắt đầu Compile ROM (Lên Nhạc)
      run: |
        cd /home/runner/android/evox
        . build/envsetup.sh
        lunch evox_m21-userdebug
        mka bacon -j$(nproc --all)

    - name: Tải file ROM lên làm quà (Upload Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: EvolutionX_M21_ROM
        path: /home/runner/android/evox/out/target/product/m21/EvolutionX*.zip