name: Evolution X Build Cloud

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Maximize Build Disk Space (SUPER CLEAN MOD)
      run: |
        echo "=== Ổ đĩa trước khi dọn dẹp ==="
        df -h
        
        # Triệt hạ tận gốc các gói phần mềm nặng ký của GitHub Actions
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        
        # Dọn dẹp package manager và Docker system rác
        sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' 'mysql.*' 'azure-cli' 'google-chrome-stable' 'firefox' 'powershell' 'mono-devel'
        sudo apt-get autoremove -y
        sudo apt-get clean
        sudo docker image prune --all --force
        
        echo "=== Ổ đĩa sau khi dọn dẹp sạch sành sanh ==="
        df -h

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Setup Google Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Fetch Evolution X Source Code (Android 16)
      run: |
        # Tạo thư mục làm việc trực tiếp tại ổ đĩa gốc đã được dọn sạch
        mkdir -p /home/runner/android/evox
        cd /home/runner/android/evox
        
        git config --global user.name "Mtva8686"
        git config --global user.email "mtva8686@gmail.com"
        
        repo init -u https://github.com/Evolution-X/manifest -b bq2 --depth=1 --git-lfs --groups=all,-notdefault,-device,-darwin,-x86,-tests
        
        # Đồng bộ nguồn với 4 luồng an toàn, tiết kiệm băng thông và dung lượng tối đa
        repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --current-branch

    - name: Clone Device, Kernel, and Vendor Trees
      run: |
        cd /home/runner/android/evox
        git clone https://github.com/Mtva8686/android_device_samsung_m21 -b 16.0 device/samsung/m21
        git clone https://github.com/Mtva8686/android_device_samsung_universal9611-common -b 16.0 device/samsung/universal9611-common
        git clone https://github.com/Mtva8686/kernel_samsung_universal9611 -b Grass-Unified kernel/samsung/universal9611
        git clone https://github.com/crdroidandroid/android_vendor_samsung_m21 -b 16.0 vendor/samsung/m21
        git clone https://github.com/crdroidandroid/android_vendor_samsung_universal9611-common -b 16.0 vendor/samsung/universal9611-common

    - name: Compile ROM
      run: |
        cd /home/runner/android/evox
        . build/envsetup.sh
        lunch evox_m21-userdebug
        mka bacon -j$(nproc --all)

    - name: Upload Output ROM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EvolutionX_M21_ROM
        path: /home/runner/android/evox/out/target/product/m21/*.zip